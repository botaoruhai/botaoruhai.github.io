    <h1>第五十六章 知者不言-言者不知</h1>
    <p>知者不言，言者不知。</p>
    <p>塞其兑，闭其门；挫其锐，解其纷；和其光，同其尘，是为玄同。</p>
    <p>故不可得而亲，不可得而疏；不可得而利，不可得而害；不可得而贵，不可得而贱；故为天下贵。</p>
